              $ref: '#/components/schemas/AIOnboardingGenerateRequest'
      security:
      - BearerAccessToken: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposalCommandResponse'
          description: ''
        '400':
          content:
            application/json:

components:
  schemas:
    AIOnboardingGenerateRequest:
      type: object
      properties:
        locale:
          type: string
          default: en-US
    ActivationBlocker:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required:
      - code
      - message
    ActivationReadinessResponse:
      type: object
      properties:
        is_ready:
          type: boolean
        blockers:
          type: array
          items:
            $ref: '#/components/schemas/ActivationBlocker'
        counts:
          type: object
          additionalProperties:
            type: integer
        sections:
          type: object
          additionalProperties:
            type: object
            additionalProperties: {}
        establishment_status:
          type: string
        session_status:
          type: string
      required:
      - blockers
      - counts
      - establishment_status
      - is_ready
      - sections
      - session_status
    ActivationSummaryResponse:
      type: object
      properties:
        organization:
          $ref: '#/components/schemas/OnboardingOrganizationSummary'
        establishment:
          $ref: '#/components/schemas/OnboardingEstablishmentSummary'
        activity_description:
          allOf:
          - $ref: '#/components/schemas/ActivityDescriptionResponse'
          nullable: true
        active_modules:
          type: array
          items:
            $ref: '#/components/schemas/KeyedRuntimeItem'
        active_domains:
          type: array
          items:
            $ref: '#/components/schemas/KeyedRuntimeItem'
        optional_units:
          type: array
          items:
            $ref: '#/components/schemas/KeyedRuntimeItem'
        optional_vocabulary:
          type: array
          items:
            $ref: '#/components/schemas/RuntimeVocabularyItem'
        optional_runtime_tags:
          type: array
          items:
            $ref: '#/components/schemas/RuntimeTagItem'
        optional_routing_hints:
          type: array
          items:
            $ref: '#/components/schemas/RoutingHintItem'
        initial_owner_director_count:
          type: integer
        initial_manager_count:
          type: integer
        managers_with_domains_count:
          type: integer
        readiness:
          $ref: '#/components/schemas/ActivationReadinessResponse'
        blockers:
          type: array
          items:
            $ref: '#/components/schemas/ActivationBlocker'
        access:
          $ref: '#/components/schemas/OnboardingAccessResponse'
        effective_can_activate:
          type: boolean
      required:
      - access
      - active_domains
      - active_modules
      - activity_description
      - blockers
      - effective_can_activate
      - establishment
      - initial_manager_count
      - initial_owner_director_count
      - managers_with_domains_count
      - optional_routing_hints
      - optional_runtime_tags
      - optional_units
      - optional_vocabulary
      - organization
      - readiness
    ActivityDescriptionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        description:
          type: string
        source:
          type: string
        submitted_by_id:
          type: string
          format: uuid
          nullable: true
        validated_at:
          type: string
          format: date-time
          nullable: true
      required:
      - description
      - id
      - source
      - submitted_by_id
      - validated_at
    ActivityDescriptionUpdateResponse:
      type: object
      properties:
        session:
          $ref: '#/components/schemas/OnboardingSessionResponse'
        activity_description:
          $ref: '#/components/schemas/ActivityDescriptionResponse'
      required:
      - activity_description
      - session
    AuthResponse:
      type: object
      properties:
        authenticated:
          type: boolean
        user:
          $ref: '#/components/schemas/UserPublic'
        memberships:
          type: array
          items:
            $ref: '#/components/schemas/Membership'
        active_membership:
          allOf:
          - $ref: '#/components/schemas/Membership'
          nullable: true
        access_token:
          type: string
        access_token_expires_at:
          type: string
          format: date-time
      required:
      - access_token
      - access_token_expires_at
      - active_membership
      - authenticated
      - memberships
      - user
    BootstrapResponse:
      type: object
      properties:
        authenticated:
          type: boolean
        user:
          $ref: '#/components/schemas/UserPublic'
        memberships:
          type: array
          items:
            $ref: '#/components/schemas/Membership'
        active_membership:
          allOf:
          - $ref: '#/components/schemas/Membership'
          nullable: true
      required:
      - active_membership
      - authenticated
      - memberships
      - user
    CsrfResponse:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    DecisionEnum:
      enum:
      - accepted
      - skipped
      type: string
      description: |-
        * `accepted` - Accepted
        * `skipped` - Skipped
    DetailResponse:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    EstablishmentMembershipResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        establishment_id:
          type: string
          format: uuid
        establishment_name:
          type: string
        organization_id:
          type: string
          format: uuid
        organization_name:
          type: string
        user:
          $ref: '#/components/schemas/MembershipUserSummary'
        role:
          type: string
        status:
          type: string
        operational_domains:
          type: array
          items:
            type: string
          readOnly: true
      required:
      - establishment_id
      - establishment_name
      - id
      - operational_domains
      - organization_id
      - organization_name
      - role
      - status
      - user
    HealthResponse:
      type: object
      properties:
        status:
          type: string
      required:
      - status
    KeyedRuntimeItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
        label:
          type: string
        source:
          type: string
        active:
          type: boolean
      required:
      - active
      - id
      - key
      - label
      - source
    LoginRequest:
      type: object
      properties:
        identifier:
          type: string
        password:
          type: string
      required:
      - identifier
      - password
    MarkReadyResponse:
      type: object
      properties:
        session:
          $ref: '#/components/schemas/OnboardingSessionResponse'
        activation_summary:
          $ref: '#/components/schemas/ActivationSummaryResponse'
      required:
      - activation_summary
      - session
    Membership:
      type: object
      properties:
        id:
          type: string
          format: uuid
        establishment_id:
          type: string
          format: uuid
        establishment_name:
          type: string
        organization_id:
          type: string
          format: uuid
        organization_name:
          type: string
        role:
          type: string
        status:
          type: string
        operational_domains:
          type: array
          items:
            type: string
      required:
      - establishment_id
      - establishment_name
      - id
      - operational_domains
      - organization_id
      - organization_name
      - role
      - status
    MembershipUserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        display_name:
          type: string
          readOnly: true
        username:
          type: string
        email:
          type: string
          format: email
          nullable: true
      required:
      - display_name
      - email
      - id
      - username
    OnboardingAccessResponse:
      type: object
      properties:
        can_activate:
          type: boolean
      required:
      - can_activate
    OnboardingErrorResponse:
      type: object
      properties:
        code:
          type: string
        detail:
          type: string
        blockers:
          type: array
          items:
            $ref: '#/components/schemas/ActivationBlocker'
      required:
      - code
      - detail
    OnboardingEstablishmentSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
      required:
      - id
      - name
      - status
    OnboardingOrganizationSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
      required:
      - id
      - name
      - status
    OnboardingProposalErrorResponse:
      type: object
      properties:
        code:
          type: string
        detail:
          type: string
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ProposalValidationErrorItem'
      required:
      - code
      - detail
    OnboardingProposalPayload:
      type: object
      properties:
        schema_version:
          type: string
        operational_modules:
          type: array
          items:
            $ref: '#/components/schemas/ProposalCatalogItem'
        operational_domains:
          type: array
          items:
            $ref: '#/components/schemas/ProposalDomainOrUnitItem'
        operational_units:
          type: array
          items:
            $ref: '#/components/schemas/ProposalDomainOrUnitItem'
        runtime_vocabulary:
          type: array
          items:
            $ref: '#/components/schemas/ProposalVocabularyItem'
        runtime_tags:
          type: array
          items:
            $ref: '#/components/schemas/ProposalRuntimeTagItem'
        routing_hints:
          type: array
          items:
            $ref: '#/components/schemas/ProposalRoutingHintItem'
      required:
      - operational_domains
      - operational_modules
      - operational_units
      - routing_hints
      - runtime_tags
      - runtime_vocabulary
      - schema_version
    OnboardingProposalResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        onboarding_session_id:
          type: string
          format: uuid
        establishment_id:
          type: string
          format: uuid
        source:
          type: string
        status:
          type: string
        payload:
          $ref: '#/components/schemas/OnboardingProposalPayload'
        section_validation:
          type: object
          additionalProperties:
            type: string
        validation_errors:
          type: array
          items:
            $ref: '#/components/schemas/ProposalValidationErrorItem'
        created_by_id:
          type: string
          format: uuid
          nullable: true
        validated_by_id:
          type: string
          format: uuid
          nullable: true
        applied_by_id:
          type: string
          format: uuid
          nullable: true
        validated_at:
          type: string
          format: date-time
          nullable: true
        applied_at:
          type: string
          format: date-time
          nullable: true
        last_error_code:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - applied_at
      - applied_by_id
      - created_at
      - created_by_id
      - establishment_id
      - id
      - last_error_code
      - onboarding_session_id
      - payload
      - section_validation
      - source
      - status
      - updated_at
      - validated_at
      - validated_by_id
      - validation_errors
    OnboardingSessionCreateRequest:
      type: object
      properties:
        establishment_id:
          type: string
          format: uuid
        source_mode:
          type: string
          default: manual
      required:
      - establishment_id
    OnboardingSessionCreateResponse:
      type: object
      properties:
        created:
          type: boolean
        session:
          $ref: '#/components/schemas/OnboardingSessionResponse'
      required:
      - created
      - session
    OnboardingSessionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization:
          $ref: '#/components/schemas/OnboardingOrganizationSummary'
        establishment:
          $ref: '#/components/schemas/OnboardingEstablishmentSummary'
        started_by_id:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
        source_mode:
          type: string
        current_step:
          type: string
        ai_attempts:
          type: integer
        last_error_code:
          type: string
        started_at:
          type: string
          format: date-time
        ready_for_activation_at:
          type: string
          format: date-time
          nullable: true
        activated_at:
          type: string
          format: date-time
          nullable: true
        canceled_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - activated_at
      - ai_attempts
      - canceled_at
      - created_at
      - current_step
      - establishment
      - id
      - last_error_code
      - organization
      - ready_for_activation_at
      - source_mode
      - started_at
      - started_by_id
      - status
      - updated_at
    PatchedActivityDescriptionRequest:
      type: object
      properties:
        description:
          type: string
          minLength: 50
    PatchedMembershipUpdateRequest:
      type: object
      properties:
        role:
          $ref: '#/components/schemas/RoleEnum'
        operational_domains:
          type: array
          items:
            type: string
    ProposalCatalogItem:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        reason:
          type: string
        confidence_score:
          type: number
          format: double
          nullable: true
      required:
      - key
      - label
    ProposalCommandResponse:
      type: object
      properties:
        session:
          $ref: '#/components/schemas/OnboardingSessionResponse'
        proposal:
          $ref: '#/components/schemas/OnboardingProposalResponse'
      required:
      - proposal
      - session
    ProposalDomainOrUnitItem:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        reason:
          type: string
        confidence_score:
          type: number
          format: double
          nullable: true
        related_modules:
          type: array
          items:
            type: string
      required:
      - key
      - label
    ProposalRoutingHintItem:
      type: object
      properties:
        pattern:
          type: string
        suggested_domain_keys:
          type: array
          items:
            type: string
        suggested_unit_key:
          type: string
          nullable: true
        reason:
          type: string
        confidence_score:
          type: number
          format: double
          nullable: true
      required:
      - pattern
    ProposalRuntimeTagItem:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        related_domain_keys:
          type: array
          items:
            type: string
        reason:
          type: string
      required:
      - key
      - label
    ProposalSectionDecisionRequest:
      type: object
      properties:
        decision:
          $ref: '#/components/schemas/DecisionEnum'
      required:
      - decision
    ProposalValidationErrorItem:
      type: object
      properties:
        code:
          type: string
        section:
          type: string
        field:
          type: string
        key:
          type: string
      required:
      - code
    ProposalVocabularyItem:
      type: object
      properties:
        term:
          type: string
        meaning:
          type: string
        mapped_domain_key:
          type: string
          nullable: true
        mapped_unit_key:
          type: string
          nullable: true
        reason:
          type: string
      required:
      - meaning
      - term
    RoleEnum:
      enum:
      - owner
      - director
      - manager
      - staff
      type: string
      description: |-
        * `owner` - Owner
        * `director` - Director
        * `manager` - Manager
        * `staff` - Staff
    RoutingHintItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        pattern:
          type: string
        suggested_unit_key:
          type: string
          nullable: true
          readOnly: true
        source:
          type: string
        active:
          type: boolean
        domain_keys:
          type: array
          items:
            type: string
          readOnly: true
      required:
      - active
      - domain_keys
      - id
      - pattern
      - source
      - suggested_unit_key
    RuntimeConfigResponse:
      type: object
      properties:
        activity_description:
          allOf:
          - $ref: '#/components/schemas/ActivityDescriptionResponse'
          nullable: true
        active_modules:
          type: array
          items:
            $ref: '#/components/schemas/KeyedRuntimeItem'
        active_domains:
          type: array
          items:
            $ref: '#/components/schemas/KeyedRuntimeItem'
        optional_units:
          type: array
          items:
            $ref: '#/components/schemas/KeyedRuntimeItem'
        optional_vocabulary:
          type: array
          items:
            $ref: '#/components/schemas/RuntimeVocabularyItem'
        optional_runtime_tags:
          type: array
          items:
            $ref: '#/components/schemas/RuntimeTagItem'
        optional_routing_hints:
          type: array
          items:
            $ref: '#/components/schemas/RoutingHintItem'
      required:
      - active_domains
      - active_modules
      - activity_description
      - optional_routing_hints
      - optional_runtime_tags
      - optional_units
      - optional_vocabulary
    RuntimeTagItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
        label:
          type: string
        source:
          type: string
        active:
          type: boolean
        domain_keys:
          type: array
          items:
            type: string
          readOnly: true
      required:
      - active
      - domain_keys
      - id
      - key
      - label
      - source
    RuntimeVocabularyItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        term:
          type: string
        meaning:
          type: string
        mapped_domain_key:
          type: string
          nullable: true
          readOnly: true
        mapped_unit_key:
          type: string
          nullable: true
          readOnly: true
        source:
          type: string
        active:
          type: boolean
      required:
      - active
      - id
      - mapped_domain_key
      - mapped_unit_key
      - meaning
      - source
      - term
    ScopedUserSearchResult:
      type: object
      properties:
        id:
          type: string
          format: uuid
        display_name:
          type: string
          readOnly: true
        username:
          type: string
        email:
          type: string
          format: email
          nullable: true
        role:
          type: string
        membership_id:
          type: string
          format: uuid
      required:
      - display_name
      - email
      - id
      - membership_id
      - role
      - username
    SwitchEstablishmentRequest:
      type: object
      properties:
        establishment_id:
          type: string
          format: uuid
      required:
      - establishment_id
    UserPublic:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
          nullable: true
        identity_type:
          type: string
      required:
      - email
      - id
      - identity_type
      - username
  securitySchemes:
    BearerAccessToken:
      type: http
      scheme: bearer
      bearerFormat: opaque

openapi: 3.0.3
info:
  title: Houston API
  version: 0.1.0
  description: Houston backend API contract
paths:
  /api/schema/:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - af
          - ar
          - ar-dz
          - ast
          - az
          - be
          - bg
          - bn
          - br
          - bs
          - ca
          - ckb
          - cs
          - cy
          - da
          - de
          - dsb
          - el
          - en
          - en-au
          - en-gb
          - eo
          - es
          - es-ar
          - es-co
          - es-mx
          - es-ni
          - es-ve
          - et
          - eu
          - fa
          - fi
          - fr
          - fy
          - ga
          - gd
          - gl
          - he
          - hi
          - hr
          - hsb
          - hu
          - hy
          - ia
          - id
          - ig
          - io
          - is
          - it
          - ja
          - ka
          - kab
          - kk
          - km
          - kn
          - ko
          - ky
          - lb
          - lt
          - lv
          - mk
          - ml
          - mn
          - mr
          - ms
          - my
          - nb
          - ne
          - nl
          - nn
          - os
          - pa
          - pl
          - pt
          - pt-br
          - ro
          - ru
          - sk
          - sl
          - sq
          - sr
          - sr-latn
          - sv
          - sw
          - ta
          - te
          - tg
          - th
          - tk
          - tr
          - tt
          - udm
          - ug
          - uk
          - ur
          - uz
          - vi
          - zh-hans
          - zh-hant
      tags:
      - schema
      security:
      - BearerAccessToken: []
      - {}
      responses:
        '200':
          content:
            application/vnd.oai.openapi:
              schema:
                type: object
                additionalProperties: {}
            application/yaml:
              schema:
                type: object
                additionalProperties: {}
            application/vnd.oai.openapi+json:
              schema:
                type: object
                additionalProperties: {}
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/v1/auth/bootstrap/:
    get:
      operationId: v1_auth_bootstrap_retrieve
      description: Returns the authenticated bootstrap payload for the current bearer
        token.
      tags:
      - auth
      security:
      - BearerAccessToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/auth/csrf/:
    get:
      operationId: v1_auth_csrf_retrieve
      description: Ensures the Django CSRF cookie exists for subsequent auth mutations.
      tags:
      - auth
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsrfResponse'
          description: ''
  /api/v1/auth/login/:
    post:
      operationId: v1_auth_login_create
      description: Logs in with an email or username identifier. Requires a valid
        Django CSRF cookie and X-CSRFToken header.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/auth/logout/:
    post:
      operationId: v1_auth_logout_create
      description: Revokes the current session, preferring the bearer access token
        when available and otherwise falling back to the refresh token cookie. Requires
        CSRF and clears the houston_refresh_token HttpOnly cookie.
      tags:
      - auth
      responses:
        '204':
          description: Session revoked and refresh cookie cleared.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/auth/refresh/:
    post:
      operationId: v1_auth_refresh_create
      description: Rotates the HttpOnly refresh token cookie and issues a new opaque
        access token. Requires a valid CSRF cookie and X-CSRFToken header. The refresh
        token is read from the houston_refresh_token HttpOnly cookie.
      tags:
      - auth
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/auth/switch_establishment/:
    post:
      operationId: v1_auth_switch_establishment_create
      description: Selects the active establishment for the current auth session.
        Requires a valid bearer access token and stores the selection on the backend
        UserSession.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SwitchEstablishmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SwitchEstablishmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SwitchEstablishmentRequest'
        required: true
      security:
      - BearerAccessToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapResponse'
          description: ''
        '400':
          description: Invalid request payload.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/establishments/{establishment_id}/memberships/:
    get:
      operationId: v1_establishments_memberships_list
      description: Lists memberships for the current active establishment context.
        Requires an active selected establishment and owner or director authority.
      parameters:
      - in: path
        name: establishment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - memberships
      security:
      - BearerAccessToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EstablishmentMembershipResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/establishments/{establishment_id}/memberships/{membership_id}/:
    get:
      operationId: v1_establishments_memberships_retrieve
      description: Returns one membership inside the current active establishment
        context. Requires owner or director authority.
      parameters:
      - in: path
        name: establishment_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: membership_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - memberships
      security:
      - BearerAccessToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstablishmentMembershipResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
    patch:
      operationId: v1_establishments_memberships_partial_update
      description: Updates the role and active operational-domain assignments for
        one membership in the current active establishment context.
      parameters:
      - in: path
        name: establishment_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: membership_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - memberships
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedMembershipUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedMembershipUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedMembershipUpdateRequest'
      security:
      - BearerAccessToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstablishmentMembershipResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/establishments/{establishment_id}/memberships/{membership_id}/deactivate/:
    post:
      operationId: v1_establishments_memberships_deactivate_create
      description: Deactivates one membership in the current active establishment
        context. The last active owner cannot be deactivated.
      parameters:
      - in: path
        name: establishment_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: membership_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - memberships
      security:
      - BearerAccessToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstablishmentMembershipResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/establishments/{establishment_id}/users/search/:
    get:
      operationId: v1_establishments_users_search_list
      description: Searches active users in the current active establishment context.
        Results are tenant-filtered before serialization and return only a minimal
        membership-backed user summary.
      parameters:
      - in: path
        name: establishment_id
        schema:
          type: string
          format: uuid
        required: true
      - in: query
        name: q
        schema:
          type: string
        description: Search term with a minimum length of 2 characters.
        required: true
      tags:
      - memberships
      security:
      - BearerAccessToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScopedUserSearchResult'
          description: ''
        '400':
          description: Invalid query parameters.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/health/:
    get:
      operationId: v1_health_retrieve
      tags:
      - v1
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
          description: ''
  /api/v1/onboarding-sessions/:
    post:
      operationId: v1_onboarding_sessions_create
      description: Starts or returns an existing non-terminal onboarding session for
        an establishment. Supports manual and template source modes only.
      tags:
      - onboarding
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingSessionCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OnboardingSessionCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OnboardingSessionCreateRequest'
        required: true
      security:
      - BearerAccessToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingSessionCreateResponse'
          description: ''
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingSessionCreateResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/onboarding-sessions/{session_id}/:
    get:
      operationId: v1_onboarding_sessions_retrieve
      description: Returns one onboarding session visible to the authenticated actor.
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - onboarding
      security:
      - BearerAccessToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingSessionResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/onboarding-sessions/{session_id}/activation-summary/:
    get:
      operationId: v1_onboarding_sessions_activation_summary_retrieve
      description: Returns backend activation readiness and blockers for onboarding.
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - onboarding
      security:
      - BearerAccessToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivationSummaryResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/onboarding-sessions/{session_id}/description/:
    patch:
      operationId: v1_onboarding_sessions_description_partial_update
      description: Submits the canonical establishment activity description for onboarding.
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - onboarding
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedActivityDescriptionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedActivityDescriptionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedActivityDescriptionRequest'
      security:
      - BearerAccessToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityDescriptionUpdateResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingErrorResponse'
          description: ''
  /api/v1/onboarding-sessions/{session_id}/mark-ready/:
    post:
      operationId: v1_onboarding_sessions_mark_ready_create
      description: Marks an onboarding session ready for activation when backend readiness
        passes. This does not activate the establishment.
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - onboarding
      security:
      - BearerAccessToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarkReadyResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingErrorResponse'
          description: ''
  /api/v1/onboarding-sessions/{session_id}/proposals/:
    get:
      operationId: v1_onboarding_sessions_proposals_list
      description: Lists onboarding proposals for a path-scoped onboarding session.
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - onboarding
      security:
      - BearerAccessToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OnboardingProposalResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/onboarding-sessions/{session_id}/proposals/{proposal_id}/:
    get:
      operationId: v1_onboarding_sessions_proposals_retrieve
      description: Returns one onboarding proposal scoped to its onboarding session.
      parameters:
      - in: path
        name: proposal_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - onboarding
      security:
      - BearerAccessToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingProposalResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/onboarding-sessions/{session_id}/proposals/{proposal_id}/apply/:
    post:
      operationId: v1_onboarding_sessions_proposals_apply_create
      description: Applies a validated onboarding proposal into runtime configuration.
        This does not activate the establishment.
      parameters:
      - in: path
        name: proposal_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - onboarding
      security:
      - BearerAccessToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposalCommandResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingProposalErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingProposalErrorResponse'
          description: ''
  /api/v1/onboarding-sessions/{session_id}/proposals/{proposal_id}/reject/:
    post:
      operationId: v1_onboarding_sessions_proposals_reject_create
      description: Rejects an onboarding proposal without applying runtime changes.
      parameters:
      - in: path
        name: proposal_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - onboarding
      security:
      - BearerAccessToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposalCommandResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingProposalErrorResponse'
          description: ''
  /api/v1/onboarding-sessions/{session_id}/proposals/{proposal_id}/sections/{section}/decision/:
    post:
      operationId: v1_onboarding_sessions_proposals_sections_decision_create
      description: Accepts or skips one section of an onboarding proposal.
      parameters:
      - in: path
        name: proposal_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: section
        schema:
          type: string
        required: true
      - in: path
        name: session_id

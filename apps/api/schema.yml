components:
  schemas:
    AIOnboardingGenerateRequest:
      type: object
      properties:
        locale:
          type: string
          default: en-US
    ActionEnum:
      enum:
      - add
      - remove
      type: string
      description: |-
        * `add` - Add
        * `remove` - Remove
    ActivationBlocker:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required:
      - code
      - message
    ActivationReadinessResponse:
      type: object
      properties:
        is_ready:
          type: boolean
        blockers:
          type: array
          items:
            $ref: '#/components/schemas/ActivationBlocker'
        counts:
          type: object
          additionalProperties:
            type: integer
        sections:
          type: object
          additionalProperties:
            type: object
            additionalProperties: {}
        establishment_status:
          type: string
        session_status:
          type: string
      required:
      - blockers
      - counts
      - establishment_status
      - is_ready
      - sections
      - session_status
    ActivationResponse:
      type: object
      properties:
        session:
          $ref: '#/components/schemas/OnboardingSessionResponse'
        activation_summary:
          $ref: '#/components/schemas/ActivationSummaryResponse'
      required:
      - activation_summary
      - session
    ActivationSummaryResponse:
      type: object
      properties:
        organization:
          $ref: '#/components/schemas/OnboardingOrganizationSummary'
        establishment:
          $ref: '#/components/schemas/OnboardingEstablishmentSummary'
        activity_description:
          allOf:
          - $ref: '#/components/schemas/ActivityDescriptionResponse'
          nullable: true
        active_modules:
          type: array
          items:
            $ref: '#/components/schemas/KeyedRuntimeItem'
        active_domains:
          type: array
          items:
            $ref: '#/components/schemas/KeyedRuntimeItem'
        active_subjects:
          type: array
          items:
            $ref: '#/components/schemas/KeyedRuntimeItem'
        optional_units:
          type: array
          items:
            $ref: '#/components/schemas/KeyedRuntimeItem'
        optional_vocabulary:
          type: array
          items:
            $ref: '#/components/schemas/RuntimeVocabularyItem'
        optional_runtime_tags:
          type: array
          items:
            $ref: '#/components/schemas/RuntimeTagItem'
        optional_routing_hints:
          type: array
          items:
            $ref: '#/components/schemas/RoutingHintItem'
        initial_owner_director_count:
          type: integer
        initial_director_count:
          type: integer
        readiness:
          $ref: '#/components/schemas/ActivationReadinessResponse'
        blockers:
          type: array
          items:
            $ref: '#/components/schemas/ActivationBlocker'
        access:
          $ref: '#/components/schemas/OnboardingAccessResponse'
        effective_can_activate:
          type: boolean
      required:
      - access
      - active_domains
      - active_modules
      - active_subjects
      - activity_description
      - blockers
      - effective_can_activate
      - establishment
      - initial_director_count
      - initial_owner_director_count
      - optional_routing_hints
      - optional_runtime_tags
      - optional_units
      - optional_vocabulary
      - organization
      - readiness
    ActivityDescriptionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        description:
          type: string
        source:
          type: string
        submitted_by_id:
          type: string
          format: uuid
          nullable: true
        validated_at:
          type: string
          format: date-time
          nullable: true
      required:
      - description

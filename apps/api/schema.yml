openapi: 3.0.3
info:
  title: Houston API
  version: 0.1.0
  description: Houston backend API contract
paths:
  /api/schema/:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - af
          - ar
          - ar-dz
          - ast
          - az
          - be
          - bg
          - bn
          - br
          - bs
          - ca
          - ckb
          - cs
          - cy
          - da
          - de
          - dsb
          - el
          - en
          - en-au
          - en-gb
          - eo
          - es
          - es-ar
          - es-co
          - es-mx
          - es-ni
          - es-ve
          - et
          - eu
          - fa
          - fi
          - fr
          - fy
          - ga
          - gd
          - gl
          - he
          - hi
          - hr
          - hsb
          - hu
          - hy
          - ia
          - id
          - ig
          - io
          - is
          - it
          - ja
          - ka
          - kab
          - kk
          - km
          - kn
          - ko
          - ky
          - lb
          - lt
          - lv
          - mk
          - ml
          - mn
          - mr
          - ms
          - my
          - nb
          - ne
          - nl
          - nn
          - os
          - pa
          - pl
          - pt
          - pt-br
          - ro
          - ru
          - sk
          - sl
          - sq
          - sr
          - sr-latn
          - sv
          - sw
          - ta
          - te
          - tg
          - th
          - tk
          - tr
          - tt
          - udm
          - ug
          - uk
          - ur
          - uz
          - vi
          - zh-hans
          - zh-hant
      tags:
      - schema
      security:
      - BearerAccessToken: []
      - {}
      responses:
        '200':
          content:
            application/vnd.oai.openapi:
              schema:
                type: object
                additionalProperties: {}
            application/yaml:
              schema:
                type: object
                additionalProperties: {}
            application/vnd.oai.openapi+json:
              schema:
                type: object
                additionalProperties: {}
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/v1/auth/bootstrap/:
    get:
      operationId: v1_auth_bootstrap_retrieve
      description: Returns the authenticated bootstrap payload for the current bearer
        token.
      tags:
      - auth
      security:
      - BearerAccessToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
  /api/v1/auth/csrf/:
    get:
      operationId: v1_auth_csrf_retrieve
      description: Ensures the Django CSRF cookie exists for subsequent auth mutations.
      tags:
      - auth
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsrfResponse'
          description: ''
  /api/v1/auth/login/:
    post:
      operationId: v1_auth_login_create
      description: Logs in with an email or username identifier. Requires a valid
        Django CSRF cookie and X-CSRFToken header.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
  /api/v1/auth/logout/:
    post:
      operationId: v1_auth_logout_create
      description: Revokes the current session, preferring the bearer access token
        when available and otherwise falling back to the refresh token cookie. Requires
        CSRF and clears the houston_refresh_token HttpOnly cookie.
      tags:
      - auth
      responses:
        '204':
          description: Session revoked and refresh cookie cleared.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
  /api/v1/auth/refresh/:
    post:
      operationId: v1_auth_refresh_create
      description: Rotates the HttpOnly refresh token cookie and issues a new opaque
        access token. Requires a valid CSRF cookie and X-CSRFToken header. The refresh
        token is read from the houston_refresh_token HttpOnly cookie.
      tags:
      - auth
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
  /api/v1/auth/register/:
    post:
      operationId: v1_auth_register_create
      description: Registers a new owner and provisions an organization, draft establishment,
        and onboarding session using a valid registration invite code. Requires a
        valid Django CSRF cookie and X-CSRFToken header.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
  /api/v1/auth/register/validate-owner/:
    post:
      operationId: v1_auth_register_validate_owner_create
      description: Validates owner registration fields without provisioning any records.
        Requires a valid Django CSRF cookie and X-CSRFToken header.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationOwnerValidateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegistrationOwnerValidateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegistrationOwnerValidateRequest'
        required: true
      responses:
        '204':
          description: Owner registration fields are valid.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
  /api/v1/auth/switch_establishment/:
    post:
      operationId: v1_auth_switch_establishment_create
      description: Selects the active establishment for the current auth session.
        Requires a valid bearer access token and stores the selection on the backend
        UserSession.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SwitchEstablishmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SwitchEstablishmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SwitchEstablishmentRequest'
        required: true
      security:
      - BearerAccessToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/establishments/{establishment_id}/membership-invitations/:
    post:
      operationId: v1_establishments_membership_invitations_create
      description: Invites a staff or manager member to the active establishment.
        Returns a copyable invitation link; email delivery is not included in MVP.
      parameters:
      - in: path
        name: establishment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - memberships
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MembershipInvitationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MembershipInvitationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MembershipInvitationRequest'
        required: true
      security:
      - BearerAccessToken: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DirectorInvitationResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DirectorInvitationErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/establishments/{establishment_id}/memberships/:
    get:
      operationId: v1_establishments_memberships_list
      description: Lists memberships for the current active establishment context.
        Requires an active selected establishment and owner or director authority.
      parameters:
      - in: path
        name: establishment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - memberships
      security:
      - BearerAccessToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EstablishmentMembershipResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/establishments/{establishment_id}/memberships/{membership_id}/:
    get:
      operationId: v1_establishments_memberships_retrieve
      description: Returns one membership inside the current active establishment
        context. Requires owner or director authority.
      parameters:
      - in: path
        name: establishment_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: membership_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - memberships
      security:
      - BearerAccessToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstablishmentMembershipResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
    patch:
      operationId: v1_establishments_memberships_partial_update
      description: Updates the role and active operational-domain assignments for
        one membership in the current active establishment context.
      parameters:
      - in: path
        name: establishment_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: membership_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - memberships
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedMembershipUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedMembershipUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedMembershipUpdateRequest'
      security:
      - BearerAccessToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstablishmentMembershipResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/establishments/{establishment_id}/memberships/{membership_id}/deactivate/:
    post:
      operationId: v1_establishments_memberships_deactivate_create
      description: Deactivates one membership in the current active establishment
        context. The last active owner cannot be deactivated.
      parameters:
      - in: path
        name: establishment_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: membership_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - memberships
      security:
      - BearerAccessToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstablishmentMembershipResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/establishments/{establishment_id}/observations/:
    post:
      operationId: v1_establishments_observations_create
      description: Submits a validated Observation with optional linked temporary
        photo uploads. Raw text is persisted internally and is not returned.
      parameters:
      - in: path
        name: establishment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - observations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObservationSubmitRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ObservationSubmitRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ObservationSubmitRequest'
        required: true
      security:
      - BearerAccessToken: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObservationSubmitResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
  /api/v1/establishments/{establishment_id}/operational-taxonomy/:
    get:
      operationId: v1_establishments_operational_taxonomy_retrieve
      description: Returns the active operational taxonomy tree for membership scope
        assignment.
      parameters:
      - in: path
        name: establishment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - establishments
      security:
      - BearerAccessToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationalTaxonomyResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/establishments/{establishment_id}/temporary-uploads/:
    post:
      operationId: v1_establishments_temporary_uploads_create
      description: Creates a temporary private photo upload for an Observation.
      parameters:
      - in: path
        name: establishment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - uploads
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
              - file
      security:
      - BearerAccessToken: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemporaryUploadResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/establishments/{establishment_id}/temporary-uploads/{upload_id}/:
    delete:
      operationId: v1_establishments_temporary_uploads_destroy
      description: Deletes an unlinked temporary photo upload owned by the current
        user.
      parameters:
      - in: path
        name: establishment_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: upload_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - uploads
      security:
      - BearerAccessToken: []
      responses:
        '204':
          description: Deleted.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/establishments/{establishment_id}/transcriptions/:
    post:
      operationId: v1_establishments_transcriptions_create
      description: Accepts multipart audio, transcribes via backend OpenAI, deletes
        the temp file in all cases, and returns editable text. Audio is never persisted.
      parameters:
      - in: path
        name: establishment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - uploads
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
              - file
      security:
      - BearerAccessToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranscriptionResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '408':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
          description: ''
  /api/v1/establishments/{establishment_id}/users/search/:
    get:
      operationId: v1_establishments_users_search_list
      description: Searches active users in the current active establishment context.
        Results are tenant-filtered before serialization and return only a minimal
        membership-backed user summary.
      parameters:
      - in: path
        name: establishment_id
        schema:
          type: string
          format: uuid
        required: true
      - in: query
        name: q
        schema:
          type: string
        description: Search term with a minimum length of 2 characters.
        required: true
      tags:
      - memberships
      security:
      - BearerAccessToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScopedUserSearchResult'
          description: ''
        '400':
          description: Invalid query parameters.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/establishments/{establishment_id}/workspace-summary/:
    get:
      operationId: v1_establishments_workspace_summary_retrieve
      description: Returns a read-only establishment workspace summary for the current
        active establishment context. Any active member may read this summary.
      parameters:
      - in: path
        name: establishment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - establishments
      security:
      - BearerAccessToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceSummaryResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/health/:
    get:
      operationId: v1_health_retrieve
      tags:
      - v1
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
          description: ''
  /api/v1/invitations/{token}/accept/:
    post:
      operationId: v1_invitations_accept_create

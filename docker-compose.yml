x-api-build: &api_build
  context: .
  dockerfile: infra/docker/api/Dockerfile

x-api-environment: &api_environment
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,api}
  CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
  DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-replace-me-for-local-dev}
  POSTGRES_DB: ${POSTGRES_DB:-houston}
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-houston}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  POSTGRES_USER: ${POSTGRES_USER:-houston}
  POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-}
  
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}

  HOUSTON_REGISTRATION_INVITE_CODES: ${HOUSTON_REGISTRATION_INVITE_CODES:-}
  HOUSTON_AUTH_TOKEN_PEPPER: ${HOUSTON_AUTH_TOKEN_PEPPER:-}
  HOUSTON_AUTH_TOKEN_SALT: ${HOUSTON_AUTH_TOKEN_SALT:-}
  HOUSTON_CHAT_WS_TICKET_SALT: ${HOUSTON_CHAT_WS_TICKET_SALT:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}

  HOUSTON_AI_ONBOARDING_PROVIDER: ${HOUSTON_AI_ONBOARDING_PROVIDER:-openai}
  HOUSTON_AI_ONBOARDING_MODEL: ${HOUSTON_AI_ONBOARDING_MODEL:-gpt-4.1-mini}
  HOUSTON_AI_ONBOARDING_TIMEOUT_SECONDS: ${HOUSTON_AI_ONBOARDING_TIMEOUT_SECONDS:-30}
  HOUSTON_AI_ONBOARDING_MAX_RETRIES: ${HOUSTON_AI_ONBOARDING_MAX_RETRIES:-2}
  HOUSTON_AI_ONBOARDING_USE_STRICT_JSON_SCHEMA: ${HOUSTON_AI_ONBOARDING_USE_STRICT_JSON_SCHEMA:-1}
  HOUSTON_AI_OBSERVATION_PROVIDER: ${HOUSTON_AI_OBSERVATION_PROVIDER:-openai}
  HOUSTON_AI_OBSERVATION_MODEL: ${HOUSTON_AI_OBSERVATION_MODEL:-gpt-4.1-mini}
  HOUSTON_AI_OBSERVATION_TIMEOUT_SECONDS: ${HOUSTON_AI_OBSERVATION_TIMEOUT_SECONDS:-30}
  HOUSTON_AI_OBSERVATION_MAX_RETRIES: ${HOUSTON_AI_OBSERVATION_MAX_RETRIES:-2}

services:
  api:
    build: *api_build
    command: ["/app/infra/docker/api/entrypoint.sh"]
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment: *api_environment
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - private_media:/app/apps/api/private_media

  celery:
    build: *api_build
    security_opt:
      - no-new-privileges:true
    command:
      [
        "uv",
        "run",
        "celery",
        "-A",
        "config",
        "worker",
        "-l",
        "info",
        "-n",
        "houston-worker@%h",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment: *api_environment
    volumes:
      - .:/app
      - private_media:/app/apps/api/private_media

  celery-beat:
    profiles:
      - scheduler
    build: *api_build
    security_opt:
      - no-new-privileges:true
    command:
      [
        "uv",
        "run",
        "celery",
        "-A",
        "config",
        "beat",
        "-l",
        "info",
        "--scheduler",
        "celery.beat:PersistentScheduler",
        "--schedule",
        "/var/lib/celerybeat/celerybeat-schedule",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment: *api_environment
    volumes:
      - .:/app
      - celerybeat_data:/var/lib/celerybeat

  web:
    build:
      context: .
      dockerfile: infra/docker/web/Dockerfile
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    depends_on:
      - api
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      VITE_API_PROXY_TARGET: http://api:8000
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - web_node_modules:/app/apps/web/node_modules

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-houston}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-houston}
      POSTGRES_USER: ${POSTGRES_USER:-houston}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  web_node_modules:
  private_media:
  celerybeat_data:

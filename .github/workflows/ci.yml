name: CI

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: houston
          POSTGRES_USER: houston
          POSTGRES_PASSWORD: houston
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U houston -d houston"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "0"
      POSTGRES_DB: houston
      POSTGRES_USER: houston
      POSTGRES_PASSWORD: houston
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      HOUSTON_AI_OBSERVATION_PROVIDER: fake
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Install backend dependencies
        run: uv sync
      # GATE-01: mirror Makefile backend-check contract gates (local dev uses make/Docker).
      - name: Django system check
        working-directory: apps/api
        run: uv run python manage.py check
      - name: Check migrations
        working-directory: apps/api
        run: uv run python manage.py makemigrations --check --dry-run
      - name: Lint backend
        working-directory: apps/api
        run: uv run ruff check .
      - name: Generate OpenAPI schema
        working-directory: apps/api
        run: uv run python manage.py spectacular --file schema.yml
      - name: Verify schema.yml is committed
        run: git diff --exit-code apps/api/schema.yml
      - name: Run backend tests
        working-directory: apps/api
        run: uv run pytest -m "not openai_observation_smoke and not openai_smoke and not slow" -q

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci
      - name: Generate frontend API types
        working-directory: apps/web
        run: npm run api:generate
      - name: Verify types.ts is committed
        run: git diff --exit-code apps/web/src/api/generated/types.ts
      - name: Lint frontend
        working-directory: apps/web
        run: npm run lint
      - name: Run frontend tests
        working-directory: apps/web
        run: npm test
      - name: Typecheck frontend
        working-directory: apps/web
        run: npm run typecheck
      # GATE-01: mirror Makefile web-build (make verify web-check slice).
      - name: Build frontend
        working-directory: apps/web
        run: npm run build
